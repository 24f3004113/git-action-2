name: Daily Auto Commit

on:
  schedule:
    - cron: '5 9 * * *'   # Runs every day at 09:05 UTC
  workflow_dispatch:      # Lets you manually trigger it

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f3004113@ds.study.iitm.ac.in - Update file
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "24f3004113@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
